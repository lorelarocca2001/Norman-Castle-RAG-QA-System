        <script charset="utf-8" src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>                <div id="23db48c4-4d91-4206-be6c-8e19143359ff" class="plotly-graph-div" style="height:800px; width:1400px;"></div>            <script type="text/javascript">                                    window.PLOTLYENV=window.PLOTLYENV || {};                                    if (document.getElementById("23db48c4-4d91-4206-be6c-8e19143359ff")) {                    Plotly.newPlot(                        "23db48c4-4d91-4206-be6c-8e19143359ff",                        [{"customdata":[["chunk_0001","LA RUPE","Giro d'orizzonte rapido questo, perché lo sguardo è nuovamente\u003cbr\u003eattratto dal colossale masso ciclopico e cioè dalla rupe del Castello.\u003cbr\u003eL'enorme magnifico macigno è costituito da un agglomerato di tufo\u003cbr\u003epalagonico e di basalto globulare, fusi assieme in prismi poligonali a\u003cbr\u003eradiazioni centrifughe, prodotto mirabile e spettacolare delle forze\u003cbr\u003eendogene della natura. Sembra che questa l'abbia messa lì a bella\u003cbr\u003eposta per sfidare gli uomini e il tempo. Pur"],["chunk_0002","LA RUPE","nel colore, tanto che dal lato sud-ovest gli scisti basaltici assumono\u003cbr\u003eforma circolare a guisa di fiore, da far sembrare, l'insieme, il\u003cbr\u003eprodotto di un'esplosione atomica pietrificata. Se poi lo sguardo\u003cbr\u003edell'osservatore si posa sulla piattaforma del Castello (o della «\u003cbr\u003ePraca » come localmente viene chiamata) lo spettacolo di una\u003cbr\u003eapocalittica eruzione si fa più chiaro nell'immaginazione dello\u003cbr\u003estudioso. L'argilla cementizia zoolitica a globetti latt"],["chunk_0003","LA RUPE","alcune colline che circondano Aci-Castello. A proposito di quanto s'è\u003cbr\u003edetto, il Recupero (opera citata) dice testualmente: « Nei terreni tra\u003cbr\u003eNizeti ed il Castello si ritrovano diversi altri strati, parte\u003cbr\u003eorizzontali di color nero, o rossigno, come di un ferro decomposto ed\u003cbr\u003ealtri disposti a colonnette verticali parallele... ». Certo l'origine\u003cbr\u003edi questo colossale scoglio è tutt'altro che conosciuta. C'è chi opina\u003cbr\u003esia il prodotto di un'immensa eruzi"],["chunk_0004","LA RUPE","ponente, (a duemila piedi dal livello del mare) in una piccola tenuta,\u003cbr\u003eove ritrovasi la detta lava, parte disposta in rocce e parte in\u003cbr\u003estrati, in uno di questi strati, ho ritrovato alcuni tuboliti o\u003cbr\u003evaggine di vermiccioli di mare, attaccati all'istesso modo e forma che\u003cbr\u003eritrovasi nelle pietre o altre masse che sono dimorate a lungo nel\u003cbr\u003emare »... (2). Quelle conchiglie studiate dai geologi, sono\u003cbr\u003econsiderate dell'epoca quaternaria (3). Altra prova d"],["chunk_0005","LA RUPE","350 metri. Poi, senza andare ad indagare e ricercare nel lontanissimo\u003cbr\u003epassato, è cosa notoria, che i nostri vecchi ci confermano, che il\u003cbr\u003emare, da questo lato, lentamente si ritira. Ciò significa che quei\u003cbr\u003emovimenti bradisismici continuano ancora e la vita umana è troppo\u003cbr\u003ebreve per ricordare e mettere nel dovuto confronto certi movimenti per\u003cbr\u003ela cui determinazione occorrono millenni. Ritornando alla nostra Rupe,\u003cbr\u003ecome si presenta oggi, con la sua supe"],["chunk_0006","LA RUPE","diventa stato d'animo e, quindi, poesia (7): Alto e fatal sorgi dalla\u003cbr\u003esponda cupa del mare e solo infrange l'estasi lunare lo sciarbordìo\u003cbr\u003edell'onda. Nel giuoco millenario e favoloso d'ombra e d'argento il\u003cbr\u003emaschio tuo profilo avventuroso lacera il vento. A volte dai tuoi\u003cbr\u003emerli nella sera fresca e silente par di sentire un canto o una\u003cbr\u003epreghiera, roccia vivente. Forse è la voce d'una prigioniera o un'eco\u003cbr\u003edi baccanti, o il languido sospiro degli aman"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA RUPE","marker":{"color":"#AA0DFE","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA RUPE","orientation":"v","showlegend":true,"x":[-5.6357236,-5.398304,-5.6477623,-5.907726,-5.8393254,-5.1272798],"xaxis":"x","y":[3.7210386,3.7795982,3.6437142,3.5798213,3.25005,1.214882],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0007","POCHE NOTE DI GEOLOGIA","Il Parona (1) dice che « il Mediterraneo è la regione classica per la\u003cbr\u003estoria del vulcanismo cenozoico, neozoico ed attuale. L'Etna, tutto\u003cbr\u003eformato di materiale d'eruzione fin dalla base, che si calcola\u003cbr\u003edell'ampiezza di 1109 chilometri quadrati e che giace a livello del\u003cbr\u003emare, è senza dubbio uno dei vulcani più imponenti. » E parlando del\u003cbr\u003edinamismo vulcanico: « ...se una corrente di lava ha grande spessore,\u003cbr\u003ela pressione della crosta raffreddata favo"],["chunk_0008","POCHE NOTE DI GEOLOGIA","i bradisismi e sulle interpretazioni relative, è assai importante, per\u003cbr\u003ei geologi, l'acquistare, per mezzo del loro studio, la certezza che si\u003cbr\u003esono recentemente effettuati e che si effettuano tuttora dei notevoli,\u003cbr\u003eper quanto lenti, spostamenti nelle linee di spiaggia, che si\u003cbr\u003erisolvono in fenomeni di emersione e di sommersione, ora uniformi, ora\u003cbr\u003eirregolari, talvolta ripetuti sopra una stessa area. Essi chiariscono\u003cbr\u003emolti fatti della stratigrafia, sp"],["chunk_0009","POCHE NOTE DI GEOLOGIA","piana neozoica, a sud del vulcano, sorsero numerosi vulcanetti, simili\u003cbr\u003ea quelli sparsi sulle spalle stesse dell'Etna, ma nelle loro\u003cbr\u003emanifestazioni esterne indipendenti dal focolare principale. Ne sono\u003cbr\u003eavanzi gli scogli e rupi basaltiche dei ciclopi, di Aci-Castello, di\u003cbr\u003eMotta S. Anastasia, di Paternò, ecc. quelli che il De Lorenzo (2)\u003cbr\u003echiamò necks subetnei, per la somiglianza coi necks scozzesi. »"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"POCHE NOTE DI GEOLOGIA","marker":{"color":"#3283FE","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"POCHE NOTE DI GEOLOGIA","orientation":"v","showlegend":true,"x":[-5.8471646,-5.891394,-5.962557],"xaxis":"x","y":[3.7736015,3.8497071,3.9296918],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0010","I PRIMI ABITATORI DELLA TERRA D'ACI","Se con l'autorità, in materia geologica, del Parona si può far luce\u003cbr\u003esulla formazione del Castello e dei Ciclopi, rimane incerta l'epoca in\u003cbr\u003ecui avvenne tale fatto storico. Per dire qualche cosa di attendibile,\u003cbr\u003e(le affermazioni al riguardo sono anche da ponderare), sui primi\u003cbr\u003eabitanti della terra d'Aci, bisogna risalire ai tempi d'Omero. Egli\u003cbr\u003enella sua « Odissea » ci dice che la Sicilia era una terra vergine e\u003cbr\u003eselvatica, dove Ciclopi e Lestrigoni, u"],["chunk_0011","I PRIMI ABITATORI DELLA TERRA D'ACI","più facile l'adattamento. Dovevano esisterne anche nelle nostre\u003cbr\u003econtrade; ma in queste il terreno ha subito totali e radicali\u003cbr\u003esconvolgimenti (cataclismi, lave dell'Etna ecc.) da cancellarne ogni\u003cbr\u003evestigia. Comunque una di queste abitazioni troglodite doveva essere\u003cbr\u003equella grotta che si apre sul lato nord-est del Castello, sotto\u003cbr\u003el'arco, dove una volta era il ponte levatoio e un'altra nella isoletta\u003cbr\u003eLachea. Per la prima infatti non si potrebbe spiega"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"I PRIMI ABITATORI DELLA TERRA D'ACI","marker":{"color":"#85660D","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"I PRIMI ABITATORI DELLA TERRA D'ACI","orientation":"v","showlegend":true,"x":[-5.6475153,-5.5030336],"xaxis":"x","y":[2.7307446,2.370038],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0012","PRIME GUERRE NEL TERRITORIO D'ACI","Nel 414 a.C. abbiamo una prima guerra menzionata dalla storia, una\u003cbr\u003eterribile guerra di distruzione fatta dagli Ateniesi contro Akis. È\u003cbr\u003equi d'uopo menzionare la tremenda eruzione del 396 a.C. che arrivò al\u003cbr\u003emare e forse allungò, trasformando la struttura della costa di Capo\u003cbr\u003eXiphonio (Capo Mulini). Questa eruzione non solo è storicamente\u003cbr\u003eimportante perché assieme a molte altre, ha servito a trasformare\u003cbr\u003el'aspetto della nostra costa, ma in quanto s'in"],["chunk_0013","PRIME GUERRE NEL TERRITORIO D'ACI","ciò accadeva ad Imilcone, che con alquanto ritardo poteva occupare\u003cbr\u003eCatania ed il territorio circostante, Diodoro ci narra di una\u003cbr\u003eleggendaria battaglia navale conclusasi fra Porto Ulixis e la Rupe di\u003cbr\u003eAkis. Di questa battaglia navale, combattuta con estrema ferocia, si\u003cbr\u003eraccontano particolari che sanno di avveduta strategia tattica, con\u003cbr\u003eaccorgimenti, che quasi farebbero onore agli ammiragli dei nostri\u003cbr\u003egiorni. L'ammiraglio dei Cartaginesi era Magone,"],["chunk_0014","PRIME GUERRE NEL TERRITORIO D'ACI","forzò anche lui la velatura e dando nuova vigoria ai rematori, sperò\u003cbr\u003edi raggiungere il nemico per dargli quella lezione da cui doveva\u003cbr\u003edipendere la sorte della guerra. Ma l'inseguimento durò poco perché\u003cbr\u003edalla nave ammiraglia nemica ben presto si levò una fumata (il segnale\u003cbr\u003econvenuto) e poco dopo il mare, che a levante sembrava deserto, si\u003cbr\u003epopolò di vele. Erano le navi di Magone che, secondo gli ordini\u003cbr\u003ericevuti, erano accorse. Ben presto la flotta"],["chunk_0015","PRIME GUERRE NEL TERRITORIO D'ACI","Galatea. Ma la dolce figlia di Nereo aveva preferito donare il suo\u003cbr\u003ecuore al biondo e mite pastorello Aci ch'era bello e perfetto come un\u003cbr\u003eadone. In un prato olezzante di fiori rari, con tutti i colori caldi\u003cbr\u003edell'arcobaleno, all'ombra di magnifici platani, viene concepito il\u003cbr\u003efrutto del loro ardente amore che prese un nome di poesia: « Platano\u003cbr\u003e». Polifemo, reso pazzo dal dolore e dalla gelosia, rivolse tutta la\u003cbr\u003esua ira contro il pastore Aci al quale"],["chunk_0016","PRIME GUERRE NEL TERRITORIO D'ACI","ridente e graziosa borgata che, per ricordarne il nome, si chiamò: «\u003cbr\u003eAci - Platani » (ch'è l'attuale ridente ed ameno paese vicino\u003cbr\u003eAcireale). Tutto ciò altro non è che mitologia e accesa fantasia che\u003cbr\u003eserviva al popolo per spiegare le cose più grandi di lui e cioè per\u003cbr\u003edare una ragione d'essere alle inesplicabili ed irruenti forze della\u003cbr\u003enatura. Molto probabilmente il Ciclope Polifemo è la personificazione\u003cbr\u003edell'Etna; la ninfa Galatea è la personific"],["chunk_0017","PRIME GUERRE NEL TERRITORIO D'ACI","rappresentava il dolce amplesso d'amore fra Aci e Galatea. Ed a questo\u003cbr\u003epunto è bene notare che il nome Akis, che come è noto in greco\u003cbr\u003esignifica punta, resiste al tempo ed i pescatori della costa\u003cbr\u003econtinuano a chiamare Jaci (Akis con l'a strisciata), la barra o\u003cbr\u003esaetta del timone delle loro barche. Fantasia e mitologia ispirarono i\u003cbr\u003epoeti d'allora. Ovidio (parlando di Galatea): « e mandò al mare le\u003cbr\u003enove ondose some « e d'Aci dié per sempre al fiume i"],["chunk_0018","PRIME GUERRE NEL TERRITORIO D'ACI","Tutto ciò non può e non deve destare meraviglia se si pensa che nei\u003cbr\u003etempi antichi si credeva che la terra fosse situata nel centro\u003cbr\u003edell'Universo e consistesse di un esiguo disco di terreno asciutto\u003cbr\u003einteramente circondato dalle acque dell'oceano e stesse sospesa in\u003cbr\u003earia come la bara di Maometto, o come un palloncino sfuggito dalle\u003cbr\u003emani di un bimbo. Occorsero molti secoli per venire alla conclusione\u003cbr\u003eche la terra era sferica e che navigava nello spa"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"PRIME GUERRE NEL TERRITORIO D'ACI","marker":{"color":"#782AB6","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"PRIME GUERRE NEL TERRITORIO D'ACI","orientation":"v","showlegend":true,"x":[-5.8652387,-5.857569,-6.07552,-6.2171283,-6.35414,-6.376637,-6.5075326],"xaxis":"x","y":[2.3623707,2.0303278,2.0736015,1.9485909,2.05926,2.0972717,2.267322],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0019","LA STORIA DI ROCCA SATURNIA","Ritornando, se non alla vera storia documentata, almeno ai margini di\u003cbr\u003eessa, nel libro 10 epistolario 70 di Diodoro, riportato da un gesuita\u003cbr\u003e(1) troviamo questa epigrafe: ALLA DEA OGNIA SATURNIA ETNEA AGLI DEI\u003cbr\u003eMADRE FIGLIA MOGLIE IN QUESTO PORTO EBBE SEPOLCRO TEMPIO ROCCA ACIS\u003cbr\u003ePRONIPOTE DI SATURNO FRATELLO DI LATINO Vuolsi che per questa epigrafe\u003cbr\u003ei Romani chiamassero la Rupe Rocca Saturnia. Secondo invece Diodoro,\u003cbr\u003eSaturno aveva regnato in Sicilia"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA STORIA DI ROCCA SATURNIA","marker":{"color":"#565656","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA STORIA DI ROCCA SATURNIA","orientation":"v","showlegend":true,"x":[-4.7386465],"xaxis":"x","y":[-1.2422918],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0020","PERIODO ROMANO","Nel 263 a. C. i Romani occuparono Catania (e la chiamarono Catina) e\u003cbr\u003edi conseguenza la rupe di Akis. Qui è ben da notare che i Romani,\u003cbr\u003emaestri nel diritto e nel saper governare, si cattivarono in breve la\u003cbr\u003ebenevolenza di quelle popolazioni, tanto che dopo pochi anni della\u003cbr\u003eloro conquista, si fecero amici e protettori della nostra gente, al\u003cbr\u003epunto che nel 214 a. C. troviamo AKIS e Catina alleati con Marcello\u003cbr\u003eper la II guerra Punica. Così racconta Sil"],["chunk_0021","PERIODO ROMANO","rocca e a stabilirvi un presidio militare, dando così vita alla prima\u003cbr\u003efortezza. Ciò accadeva l'anno 535 d. C. (3). Osservando quello che\u003cbr\u003eoggi resta del Castello senza dubbio noi ci troviamo dinanzi ad una\u003cbr\u003ecostruzione prettamente normanna e di questo ce ne dà sicurezza Pirro\u003cbr\u003enel dirci che la costruzione, o meglio la sua ultima ricostruzione\u003cbr\u003erisale all'anno 1092. Ultima ricostruzione nelle linee generali,\u003cbr\u003epoiché il vecchio maniero fu costruito, rim"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"PERIODO ROMANO","marker":{"color":"#1C8356","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"PERIODO ROMANO","orientation":"v","showlegend":true,"x":[-4.639124,-4.767966],"xaxis":"x","y":[2.4030561,2.553942],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0022","PERIODO SARACENO","Per poter spiegare perché questo nostro Castello fu tenuto per lungo\u003cbr\u003etempo dai Saraceni, occorre dire che la storia dei Saraceni ad Akis\u003cbr\u003es'identifica con la parte che essi ebbero in tutta la Sicilia. Le\u003cbr\u003efortune che ebbero ad Akis sono le fortune che i Saraceni incontrarono\u003cbr\u003enell'intera Isola e viceversa. Comunque si deve riconoscere che il\u003cbr\u003eperiodo di dominazione Saracena non fu dei peggiori, anzi sotto la\u003cbr\u003edominazione di qualcuno dei loro principi,"],["chunk_0023","PERIODO SARACENO","Saraceni come movente per sbarcare in Sicilia. Intorno all'800 d. C. a\u003cbr\u003eSiracusa un certo Eufemio che rivestiva la carica di capitano della\u003cbr\u003emilizia (carica molto importante per l'epoca), era un uomo violento,\u003cbr\u003eorgoglioso, dissoluto, senza religione e senza scrupoli. Guai a cadere\u003cbr\u003ein disgrazia di costui! C'era da aspettarsi di tutto, dalla vendetta\u003cbr\u003epiù spietata alla morte più orribile. Questa specie di mostro umano\u003cbr\u003es'era invaghito e selvaggiamente i"],["chunk_0024","PERIODO SARACENO","del sacro recinto. Un editto, da Costantinopoli, condannò lo\u003cbr\u003esciagurato Capitano ad avere la lingua mozza, previa degradazione.\u003cbr\u003eEufemio, appena avuto sentore che le cose si mettevano male per lui,\u003cbr\u003esi rifugiò a Tripoli. In Africa preparò la sua vendetta, si presentò a\u003cbr\u003equell'Emiro, descrisse esageratamente le ricchezze e la feracità della\u003cbr\u003eSicilia, nonché la bellezza eccezionale delle ragazze siciliane.\u003cbr\u003eL'Emiro non aspettava altro, per mettere in at"],["chunk_0025","PERIODO SARACENO","investite furono distrutte ed invase da una marea di arabi. Nel 902\u003cbr\u003eespugnarono il nostro Castello (1), dopo la caduta di Catania. La\u003cbr\u003ecaduta della Rocca non fu facile, costò tante perdite ai Saraceni,\u003cbr\u003etanto che l'Emiro Ibrahim, che li comandava, per rabbia e vendetta\u003cbr\u003eordinò la distruzione totale del Castello e volle che le pietre\u003cbr\u003efossero buttate in mare. Ma, nel 969, 67 anni dopo, il Califfo Al-\u003cbr\u003eMoez, apprezzando la posizione della Rupe, fece rico"],["chunk_0026","PERIODO SARACENO","dall'alto del suo Kalat proteggeva la popolazione, Jachium era assurta\u003cbr\u003eal ruolo di grande e prosperosa città. Si dice che allora contasse\u003cbr\u003ecirca 8000 abitanti, fra cui figuravano, naturalmente oltre ai\u003cbr\u003esiciliani, 334 capi famiglia arabi e 53 vedove dei greci. Che fosse\u003cbr\u003euna città importante è desunto da ciò che scrisse il geografo Al-Uman\u003cbr\u003evissuto dal 1300 al 1348. Questi infatti, dopo avere annoverato\u003cbr\u003ePalermo come prima città e Taormina come second"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"PERIODO SARACENO","marker":{"color":"#16FF32","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"PERIODO SARACENO","orientation":"v","showlegend":true,"x":[-4.259374,-4.158443,-4.0330896,-4.984379,-5.2488847],"xaxis":"x","y":[1.6971142,1.3281565,1.5545828,2.1332374,2.4303799],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0027","PERIODO NORMANNO","Gli Arabi, nonostante il loro buon governo, non erano del tutto ben\u003cbr\u003evisti dalla popolazione per molteplici ragioni, fra cui la differente\u003cbr\u003ereligione. Si nota, a tal proposito, che i siciliani sono sempre\u003cbr\u003erimasti profondamente Cristiani, anche quando i Saraceni, agevolando\u003cbr\u003eed aiutando la popolazione, cercavano di far leva onde smuovere il\u003cbr\u003eloro attaccamento al Cristianesimo. Ciò è ampiamente dimostrato dal\u003cbr\u003emotto trovato fra i ruderi di una costruzio"],["chunk_0028","PERIODO NORMANNO","e Saraceni e tanto da ottenere la benevolenza dell'allora Pontefice\u003cbr\u003eLeone IX che da nemico divenne loro protettore. Protezione che arrivò\u003cbr\u003eal punto da dare ai figli di Tancredi, Roberto il Guiscardo e\u003cbr\u003eRuggiero, detto poi il Gran Conte, l'investitura degli stati\u003cbr\u003emeridionali come pure di quegli altri stati che avessero, per\u003cbr\u003eavventura, conquistato sia in Calabria che in Sicilia. Questi due\u003cbr\u003eprodi guerrieri, oltre alle naturali virtù che li resero stim"],["chunk_0029","PERIODO NORMANNO","Messina, sconfisse l'esercito nemico forte 10 volte ed anche più del\u003cbr\u003esuo ed entusiasmò quelle popolazioni che lo acclamarono eroe e\u003cbr\u003evincitore. Il Papa Alessandro II, ammirando tanto valore e tanto\u003cbr\u003eprodigio, inviò a Ruggiero lo stendardo di S. Pietro e, sotto la\u003cbr\u003enobile insegna, i normanni si coprirono di tanta gloria da liberare\u003cbr\u003el'intera Sicilia in tempo da primato. Il loro nome divenne leggendario\u003cbr\u003ee specialmente il Conte Ruggiero acquistò molta f"],["chunk_0030","PERIODO NORMANNO","gran valore e difficoltà aveva sterminato un grosso contingente di\u003cbr\u003esaraceni, si dirigeva verso Taormina dove aveva avuto sentore che un\u003cbr\u003ealtro poderoso esercito saraceno si stesse riorganizzando a battaglia.\u003cbr\u003eArrivato sulla pianura di Mascali, volle dare riposo alla truppa che,\u003cbr\u003estremata dalla battaglia sostenuta e soprattutto dalla sete che da\u003cbr\u003equalche giorno la tormentava, era in condizioni veramente pietose.\u003cbr\u003eResosi conto che, in quello stato di pr"],["chunk_0031","PERIODO NORMANNO","sconfitta si delineava nettamente. Tutto sembrava perduto, quando\u003cbr\u003eavvenne il fatto prodigioso. Nel mezzo della mischia, ad un certo\u003cbr\u003emomento, si vide un numeroso stuolo di cavalieri vestiti di bianco\u003cbr\u003ecombattere con strenuo valore contro i saraceni. Allora le sorti della\u003cbr\u003ebattaglia si capovolsero ed i saraceni furono sconfitti; poscia si\u003cbr\u003ediedero alla fuga, lasciando i normanni padroni del campo. Dopo questa\u003cbr\u003eleggendaria battaglia ve ne furono molte a"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"PERIODO NORMANNO","marker":{"color":"#F7E1A0","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"PERIODO NORMANNO","orientation":"v","showlegend":true,"x":[-3.5461974,-3.4986973,-2.9370518,-3.552961,-3.1860778],"xaxis":"x","y":[1.3753754,1.4256729,1.7580845,1.359021,1.3167405],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0032","VALVERDE","È qui d'uopo ritornare indietro per menzionare un bellissimo episodio\u003cbr\u003edi fede e carità cristiana avvenuto nei primi anni in cui la ventata\u003cbr\u003eliberatrice aveva scosso da un capo all'altro la Sicilia (1). Un\u003cbr\u003esoldato sbandato d'origine Genovese a nome Dionisio, s'aggirava nelle\u003cbr\u003ecampagne del territorio d'Aci rubando e disseminando il terrore tra\u003cbr\u003equei rari viandanti che per necessità dovevano transitare per quelle\u003cbr\u003emalsicure ed infide contrade. Nessuno d"],["chunk_0033","VALVERDE","il feroce e temuto brigante, che brandendo un enorme ed acuminato\u003cbr\u003epugnale, con movimenti rapidi e decisi gli fu subito addosso. Egidio\u003cbr\u003enon si scansò, non fuggì, ma forte della sua fede si lasciò cadere in\u003cbr\u003eginocchio e mentre il brigante sollevata l'arma stava per colpire, una\u003cbr\u003emisteriosa voce s'intese venire dall'alto: « Dionisio non toccare il\u003cbr\u003emio devoto ». E cos'è, cosa non è, il bandito esita... vacilla...\u003cbr\u003eallenta la stretta... l'arma gli sfugge"],["chunk_0034","VALVERDE","il nome di Maria. I cittadini di Jachium capirono che in quel posto la\u003cbr\u003eMadonna voleva edificato il suo Santuario. Non passò molto tempo ed\u003cbr\u003euna cappella cominciò a sorgere sul luogo; ma altra difficoltà si\u003cbr\u003epresentò ai buoni Castellesi. La mancanza assoluta d'acqua nei\u003cbr\u003edintorni ostacolava gravemente la costruzione della chiesa, tanto che\u003cbr\u003esi erano dovuti interrompere i lavori. Dionisio che, come s'è detto,\u003cbr\u003eera divenuto un fervente ed entusiasta devo"],["chunk_0035","VALVERDE","costruzione del Santuario, questo s'è dovuto ampliare e questo suo\u003cbr\u003eampliamento fu dovuto, come s'è detto, al Conte Ruggiero. Un terzo\u003cbr\u003emiracolo pare sia avvenuto nei primi anni della costruzione del\u003cbr\u003eSantuario, costruzione come s'è detto voluta ed effettuata per merito\u003cbr\u003edei cittadini di Jachium. Ecco il fatto come comunemente viene\u003cbr\u003eraccontato dai locali e riportato anche da qualche autore. La\u003cbr\u003echiesetta era ultimata, ma mancava un quadro, un'effigie"],["chunk_0036","VALVERDE","oggi si venera a Valverde, è di una bellezza impressionante e di\u003cbr\u003efinissima fattura. I competenti affermano che l'origine del quadro è\u003cbr\u003ebizantina. Riprendiamo la scia della storia. Nel 1081 il Castello\u003cbr\u003eviene occupato nuovamente dai Saraceni, ma per breve tempo, perché il\u003cbr\u003eConte Ruggiero lo rioccupa assieme a Catania, che si era ribellata,\u003cbr\u003eavendo seguito il tradimento dell'Emiro Benfort. Durante il dominio\u003cbr\u003edel Conte Ruggiero il Castello e la città eb"],["chunk_0037","VALVERDE","Vescovo giurò di custodire le spoglie della Vergine Martire Catanese.\u003cbr\u003ePer ricordare tale avvenimento storico e sacro, Aci-Castello indisse\u003cbr\u003edue grandi manifestazioni (Agosto 1926 e Agosto del 1951). Nella\u003cbr\u003emanifestazione del 1926 fu murata, ai piedi del Castello, la seguente\u003cbr\u003elapide: NELLE STORICHE SALE DI QUESTO CASTELLO FEUDALE MAURIZIO\u003cbr\u003eVESCOVO DI CATANIA ACCOLSE NELL'AGOSTO MCXXVI IL VENERATO CORPO DI S.\u003cbr\u003eAGATA V. E M. CHE SI TRASFERIVA DA COSTANT"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"VALVERDE","marker":{"color":"#E2E2E2","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"VALVERDE","orientation":"v","showlegend":true,"x":[-2.4208844,-2.1907701,-2.0228179,-2.04788,-1.856182,-1.7151649],"xaxis":"x","y":[1.5494452,1.7744386,1.8748873,1.7256523,1.32829,1.6140532],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0038","IL CATACLISMA","Mentre Jachium diveniva città floridissima ed i commerci si\u003cbr\u003esviluppavano in tutte le direzioni (si esportavano, oltre i prodotti\u003cbr\u003eagricoli, anche pesce e laterizi) (1), un infausto avvenimento pose\u003cbr\u003efine a quel periodo di splendore e prosperità. Ci riferiamo ad un\u003cbr\u003eterribile cataclisma che mutò il corso della storia del luogo e\u003cbr\u003epersino la forma e la struttura della contrada. Di esso si occuparono\u003cbr\u003emolti scrittori, ma noi ci basiamo soltanto su quanto"],["chunk_0039","IL CATACLISMA","plaga di terreno fertilissimo divenne un'irta pietraia e che interi\u003cbr\u003eagglomerati definitivamente sparirono. Tra la popolazione le vittime\u003cbr\u003efurono numerosissime. Delle enormi proporzioni della colata lavica del\u003cbr\u003e1169 se ne può avere un'idea osservando, nel tratto che da Aci-\u003cbr\u003eCastello va fino ad Ognina, la gigantesca rupe della contrada Corvo\u003cbr\u003edove la colata lavica raggiunse un'altezza di circa 30 metri (3).\u003cbr\u003eAltre considerazioni interessanti possono far"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"IL CATACLISMA","marker":{"color":"#1CBE4F","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"IL CATACLISMA","orientation":"v","showlegend":true,"x":[-5.3393674,-5.1412387],"xaxis":"x","y":[2.957273,3.355201],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0040","FORMAZIONE DEI BORGHI","Dopo che la natura nel suo tremendo furore distrusse ogni cosa, gli\u003cbr\u003eabitanti superstiti, avviliti e terrorizzati, si dispersero per le\u003cbr\u003ecampagne circostanti; molti di essi ritornarono nei luoghi di origine\u003cbr\u003edei loro avi e così si formarono i diversi nuclei abitati che\u003cbr\u003eportarono di preferenza il nome della famiglia più cospicua (1). In\u003cbr\u003eseguito presero il prefisso di Aci, per indicare che tutti da Aci\u003cbr\u003eprovenivano, da Aci avevano avuto origine. Ciò è"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"FORMAZIONE DEI BORGHI","marker":{"color":"#C4451C","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"FORMAZIONE DEI BORGHI","orientation":"v","showlegend":true,"x":[-3.4550438],"xaxis":"x","y":[2.8887136],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0041","I VESPRI SICILIANI","Dopo il tremendo flagello che spense e sconvolse la vita del Castello\u003cbr\u003ee delle adiacenze, sembrava che la funerea coltre di lava dovesse\u003cbr\u003eprecludere ogni speranza di rinascita; ma non fu così. La posizione\u003cbr\u003edel Castello rimaneva sempre in primo piano nei disegni di offesa e di\u003cbr\u003edifesa che allora facevano i potenti. Infatti nel 1189, cioè a 20 anni\u003cbr\u003eappena da tanta distruzione, il Re Tancredi restaurava il Castello e\u003cbr\u003econ il Castello risorgeva lentament"],["chunk_0042","I VESPRI SICILIANI","d'Aragona e partecipare il 15 Novembre dello stesso anno (dopo\u003cbr\u003el'esilio del Vescovo di Catania, D'Angelo), al parlamento generale\u003cbr\u003eriunitosi a Catania per trattare gli affari di guerra. A Pietro di\u003cbr\u003eAragona successe Re Giacomo, che nel 1287 (come scrive Fra' Attanasio\u003cbr\u003edi Aci in dialetto Siciliano) (2), nominò governatore di Aci Messer\u003cbr\u003eTudisco per le sue acquisite alte benemerenze. Ma il nuovo governatore\u003cbr\u003ediede poca importanza al Castello, cosicché"],["chunk_0043","I VESPRI SICILIANI","Castrum et terram Jaci, quae ad Episcum Cataniensen, qui erit pro\u003cbr\u003etempore, vel ad conventum Cataniensen ecclesia, aut ad utrusque\u003cbr\u003epertinere, nos cuntur, quae ad praesens tenes et possides cum\u003cbr\u003eterritorius, et districtibus, et pertinentes suis mero et mixto\u003cbr\u003eimperio, jurisdictione tibi, tuisque haeredibus legitimis...\u003cbr\u003econcedimus conferimus et etiam confirmamus sub annuo censu triginta\u003cbr\u003eunciarum auri dictis Episcopo » (5). Ma Re Federico II non la pen"],["chunk_0044","I VESPRI SICILIANI","il ponte e costrinsero la guarnigione a combattere a parità di\u003cbr\u003econdizioni. Ma gli armati di Lauria erano stremati dal lungo assedio,\u003cbr\u003ementre quelli di Re Federico erano freschi, ben nutriti, con il\u003cbr\u003evantaggio di potersi sempre dare il cambio. Il Castello dovette\u003cbr\u003earrendersi. Era il Novembre dell'anno 1297 (6). Re Federico riebbe il\u003cbr\u003eCastello e vi dimorò a lungo. Nel 1300 in qualità di Re di Trinacria,\u003cbr\u003ericevette in dono il manoscritto (De Inferno) (7)"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"I VESPRI SICILIANI","marker":{"color":"#DEA0FD","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"I VESPRI SICILIANI","orientation":"v","showlegend":true,"x":[-3.1933045,-2.871172,-3.2567105,-3.0544715],"xaxis":"x","y":[-0.19547753,-0.23908497,-0.29102522,-0.35394982],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0045","LA PACE DI CALTABELLOTTA","Nel 1302 fu conclusa la pace di Caltabellotta fra Carlo II e Federico\u003cbr\u003eII. In base ai trattati di quella pace il Castello fu ridato a\u003cbr\u003eRuggiero di Lauria, che frattanto si era pentito del tradimento alla\u003cbr\u003ecasa d'Aragona. Come conferma di tale pentimento, gli fu imposto di\u003cbr\u003eportarsi a Catania ed inginocchiarsi ai piedi di Federico II, che in\u003cbr\u003equel periodo soggiornava in quella città. Nel 1305 l'ammiraglio\u003cbr\u003eRuggiero di Lauria morì ed a lui successe la fi"],["chunk_0046","LA PACE DI CALTABELLOTTA","Lauria. Margherita di Lauria riebbe il Castello, ma non lo tenne in\u003cbr\u003egran conto come non tenne in gran conto tutto il territorio d'Aci\u003cbr\u003ecompresa Aquilia Vetere, tanto che quest'ultimo periodo fu uno dei\u003cbr\u003epeggiori che la nostra gente attraversò; alla decadenza della autorità\u003cbr\u003eseguì una decadenza del costume e la miseria e la fame tormentarono le\u003cbr\u003enostre buone popolazioni. Federico II, nell'apprendere lo stato di\u003cbr\u003emiseria e d'abbandono in cui erano lasci"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA PACE DI CALTABELLOTTA","marker":{"color":"#FE00FA","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA PACE DI CALTABELLOTTA","orientation":"v","showlegend":true,"x":[-2.7839825,-2.8175652],"xaxis":"x","y":[-0.64081615,-0.45840198],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0047","GLI ALAGONA","Blasco d'Alagona (1), come segno di vassallaggio, era tenuto a pagare\u003cbr\u003ealla Chiesa, e per questa al Vescovo di Catania, 30 onze di moneta\u003cbr\u003ed'oro, che erano sempre quelle 30 onze risultanti dagli accordi\u003cbr\u003estipulati a suo tempo con Giovanni di Lauria. Questa imposta di\u003cbr\u003evassallaggio, oltre a costituire un utile per le casse dei re, dei\u003cbr\u003eprincipi e dei signorotti, rappresentava per essi la facoltà\u003cbr\u003einsindacabile di potere in ogni momento ed anche senza mo"],["chunk_0048","GLI ALAGONA","i Ghibellini ed i Napoletani per i Guelfi. Si sviluppò una nuova\u003cbr\u003eguerra e nella prima fase di essa furono i Siciliani ad avere la\u003cbr\u003evittoria. Infatti un'armata Siciliana si portò in territorio\u003cbr\u003eNapoletano, sconfisse i Guelfi e secondo l'uso del tempo saccheggiò e\u003cbr\u003edevastò quel territorio. Ma la sopraggiunta morte del condottiero\u003cbr\u003eportò i Siciliani ad uno scoramento generale. I Napoletani si\u003cbr\u003eriebbero, cacciarono i Siciliani dal continente, poscia attra"],["chunk_0049","GLI ALAGONA","Messina. Mentre questa armata, forte di alcune decine di galere e\u003cbr\u003ebarconi passava al largo del Castello, gli abitanti del luogo, resi\u003cbr\u003ebaldanzosi dal fatto che il nemico sfuggiva alla battaglia ed\u003cbr\u003eorgogliosi del Castello che aveva tenuto così alto il prestigio dei\u003cbr\u003eGhibellini, si misero a beffeggiare, a schernire in tutti i modi i\u003cbr\u003esoldati che passavano al largo. Del Balzo, umiliato della sconfitta\u003cbr\u003egià subita al largo di Ognina, s'incollerì e, per p"],["chunk_0050","GLI ALAGONA","Vetere, che sorgeva un poco più sotto della attuale Aci-Reale, nei\u003cbr\u003epressi della contrada Grazie. Ma il peggio intanto accadde ed a Blasco\u003cbr\u003ed'Alagona non restò altro che registrare lo scorno patito. Per\u003cbr\u003eprevenire ogni futura evenienza del genere ordinò che si costruissero\u003cbr\u003ele mura di cinta, che forse sono ancora quelle di cui oggi si vedono i\u003cbr\u003eruderi (4). I muri erano resi più efficienti da un gran fossato\u003cbr\u003eprofondo 15 metri e che in seguito il tempo"],["chunk_0051","GLI ALAGONA","fu arricchito di altre opere militari e crebbe quindi di potenza e\u003cbr\u003eprestigio (6). Nel 1348 una terribile peste si sparse per la Sicilia,\u003cbr\u003evi fu una grande moria che non rispettò nemmeno Giovanni, che aveva\u003cbr\u003ecercato di sfuggire alla terribile epidemia portandosi a Milo, luogo\u003cbr\u003epiù fresco e meno abitato, luogo dove il flagello avrebbe fatto minore\u003cbr\u003estrage (7). Al Duca Giovanni succedette il figlio Federico, ma essendo\u003cbr\u003equesti di tenera età, il Castello"],["chunk_0052","GLI ALAGONA","anzi la Sicilia intera, era oggetto di contesa fra Angioini ed\u003cbr\u003eAragonesi. Gli Angioini mal s'adattavano alla perdita della Sicilia e\u003cbr\u003el'anno 1356, cioè un anno dopo la terribile peste, si prefissero di\u003cbr\u003ericonquistarla. Prima d'iniziare le operazioni di guerra misero in\u003cbr\u003eopera tutte le arti per corrompere alcuni feudatari e molti baroni\u003cbr\u003edell'Isola, promettendo loro terre, privilegi, domini, onori.\u003cbr\u003eDopodiché, cioè quando il terreno e l'ambiente erano"],["chunk_0053","GLI ALAGONA","intanto arrivarono a Nizeti e per dispetto di non aver trovato il\u003cbr\u003enemico, scesero ad Aci, travolsero le mura, incendiarono, uccisero,\u003cbr\u003eviolentarono le donne e commisero ogni sorta di nefandezze. Poi\u003cbr\u003efacendosi aiutare da alcune galere, che il Re di Napoli s'era\u003cbr\u003epremurato a mandare come sostegno dell'esercito, assalirono il\u003cbr\u003eCastello e dopo qualche tempo costrinsero alla resa i difensori. Fu\u003cbr\u003egran lutto per Aci-Castello. Era la domenica del 7 Maggio 1"],["chunk_0054","GLI ALAGONA","Ciò fu di stimolo al suo valore ed all'amor proprio. Infatti,\u003cbr\u003eraccontano gli storici che dopo quel primo affronto, Artale non ci\u003cbr\u003evedesse più dall'ira e fosse nel furore della disperazione; che ben\u003cbr\u003econoscendo quale sorte gli sarebbe toccata in caso di sconfitta, con\u003cbr\u003ela sua nave egli si buttasse allo sbaraglio sulla capitana nemica,\u003cbr\u003eavvincendola alla sua con arpioni. Il combattimento avvenne corpo a\u003cbr\u003ecorpo ed il comandante nemico e l'equipaggio furo"],["chunk_0055","GLI ALAGONA","Cesareo e Giulio Saitti (10). Si organizzò una resistenza in modo che\u003cbr\u003ein prima linea si appostassero i soldati del Cesareo, in seconda linea\u003cbr\u003ei baroni ed i feudatari che tenevano in custodia tutto quello che\u003cbr\u003eavevano saccheggiato e quanto di più prezioso avevano da custodire,\u003cbr\u003epoi veniva la terza linea che serviva nel medesimo tempo da riserva e\u003cbr\u003eretroguardia. I soldati di Federico, però, capitanati da Corrado\u003cbr\u003eSpadafora, assalirono alle spalle i sold"],["chunk_0056","GLI ALAGONA","contadini, appena visto quale vantaggio ne avrebbero ricavato senza\u003cbr\u003ecorrere alcun pericolo, si buttarono con ingordigia sul bottino e non\u003cbr\u003epensarono ad ostacolare in alcun modo la strada al nemico. Dopo\u003cbr\u003equalche giorno infatti si videro quei rudi villici sfoggiare vestiti\u003cbr\u003edi broccato di gran pregio, altri furono venduti, cosicché per qualche\u003cbr\u003etempo tutti crebbero in agiatezza e benessere (12). Se i francesi la\u003cbr\u003escamparono nella pianura di Mascali per"],["chunk_0057","GLI ALAGONA","affidata come pupilla fino a che essa avrebbe raggiunto la maggiore\u003cbr\u003eetà o sarebbe andata sposa. Date le circostanze, Artale divenne\u003cbr\u003earbitro del Regno di Sicilia e siccome ciò non mancava di fomentare\u003cbr\u003eodii ed invidie, così pensò di mettersi d'accordo con altri potenti\u003cbr\u003equali i Ventimiglia, i Peralta, i Chiaramonti e con essi divise\u003cbr\u003el'Isola in zone d'influenza (14). Per sé tenne il lato orientale da\u003cbr\u003eMessina a Siracusa e tenne la giovane Maria, erede"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"GLI ALAGONA","marker":{"color":"#325A9B","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"GLI ALAGONA","orientation":"v","showlegend":true,"x":[-3.895662,-4.2501554,-4.5610843,-3.4764178,-3.740625,-4.3930297,-4.6308303,-4.7411537,-4.4641037,-4.098981,-4.430799],"xaxis":"x","y":[-0.54673177,-0.40250298,-0.3613654,-0.8336404,-0.68091005,-0.81008106,-0.8673896,-0.46176746,-0.19863476,-1.0763807,-2.0067487],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0058","RE MARTINO","Tutti questi intrighi, congiure e ribellioni dovevano aver fine per\u003cbr\u003eopera del giovane Duca Martino d'Aragona (1) che si decise dalla\u003cbr\u003eSpagna a sbarcare in Sicilia alla testa di un poderoso esercito e che\u003cbr\u003esi proponeva di portare la pace fra le popolazioni, di far cessare le\u003cbr\u003einvidie, i soprusi, le guerriglie fra i feudatari e baroni sempre in\u003cbr\u003econtinuo fermento. Sbarcò a Palermo e Manfredi, appena saputolo, si\u003cbr\u003epremurò di recarsi colà per cercare d'en"],["chunk_0059","RE MARTINO","la moglie ed i figli (3). Soddisfatto dell'atto di sottomissione, il\u003cbr\u003eCruillas si decise a partire assieme ai suoi armati. Era l'anno 1392.\u003cbr\u003eMa Artale aveva promesso quello che in cuor suo non voleva mantenere\u003cbr\u003eed infatti, non appena l'armata di Cruillas si fu allontanata,\u003cbr\u003erinforzò le mura ed il Castello dove entrò una fresca e forte scorta\u003cbr\u003edi armati. Appena queste notizie arrivarono al Duca Martino, questi\u003cbr\u003emontò su tutte le furie ed immediatamente"],["chunk_0060","RE MARTINO","da un forte esercito comandato da Calcedonio di Villanueva e da\u003cbr\u003eGuglielmo Peralta, si portò in territorio d'Aci. Appena l'armata\u003cbr\u003egiunse nelle vicinanze, si diede al saccheggio, alla devastazione,\u003cbr\u003ealla strage, tanto che molti piccoli feudatari e tirannelli delle\u003cbr\u003evicinanze si recarono a Catania, ove il Duca aveva preso dimora, per\u003cbr\u003efare atto di sottomissione e così evitare il peggio. Anche Artale,\u003cbr\u003evista la potenza di quell'armata ed anche perché spe"],["chunk_0061","RE MARTINO","si manifestò evidente perché non solo Artale non lasciò il Castello,\u003cbr\u003ema iniziò fra i baroni ed i vassalli un'opera disgregatrice,\u003cbr\u003einducendoli alla ribellione contro il Duca Martino (8). Questi se ne\u003cbr\u003eaccorse ben presto ed allora ordinò ai baroni, coi loro armati, di\u003cbr\u003eaccorrere tutti in terra d'Aci il 10 Aprile 1393 e di porre l'assedio\u003cbr\u003eal Castello (9). Molti di essi non ubbidirono e ciò crebbe l'audacia\u003cbr\u003edi Artale, che noncurante degli accordi non s"],["chunk_0062","RE MARTINO","gli inviò le chiavi del Castello. Mentre fasti e nefasti, sconfitte e\u003cbr\u003evittorie si succedevano in territorio d'Aci del quale il Castello era\u003cbr\u003eil punto nevralgico, in Sicilia serpeggiava la rivoluzione contro gli\u003cbr\u003eAragonesi. Tutto questo ben lo sapeva Artale che, con la massima\u003cbr\u003efurberia, approfittava di tutte le circostanze e di tutte le evenienze\u003cbr\u003eche tornassero a suo profitto. Aveva mandato le chiavi al Duca Martino\u003cbr\u003ema non aveva lasciato il Castello"],["chunk_0063","RE MARTINO","dovunque scoppiavano. Queste rivolte malamente represse e d'altro\u003cbr\u003ecanto lo spirito di conservare i diritti che avevano i baroni e\u003cbr\u003efeudatari, facevano sì che Martino ed Artale avessero bisogno di aiuti\u003cbr\u003ee rinforzi dall'esterno. Martino sollecitava la Spagna che mandasse\u003cbr\u003edenaro, vettovagliamento ed armi, Artale questi aiuti li cercava un\u003cbr\u003epoco a Malta, un poco dal Visconte di Milano (11). Fu in uno di questi\u003cbr\u003eviaggi che Artale fece a Milano che Martin"],["chunk_0064","RE MARTINO","firmati gli accordi fra il Duca Martino ed Artale d'Alagona, lo\u003cbr\u003escaltro Duca, per evitare come per il passato che i feudatari\u003cbr\u003eprendessero la mano al Re, fece adunare il parlamento siracusano nel\u003cbr\u003esettembre del 1398 e da esso fece emanare una legge in forza della\u003cbr\u003equale la terra d'Aci ed il Castello dovessero, in perpetuo, restare al\u003cbr\u003eDemanio (14). Si assegnava alla Rocca un castellano, con l'annuo\u003cbr\u003ecompenso di 24 onze, un vice castellano con 8 onze e"],["chunk_0065","RE MARTINO","tornei, feste, con partecipazione della popolazione ed in prima linea\u003cbr\u003edei vassalli, dei baroni e dei feudatari. Furono brevi quelle feste,\u003cbr\u003equel benessere e quella felicità passata nella turrita fortezza;\u003cbr\u003epoiché Re Martino nel 1409 morì e lasciò la moglie arbitra dei suoi\u003cbr\u003epossedimenti di Catania e di Siracusa, con la facoltà di abitare o no\u003cbr\u003eil Castello d'Aci (16). Al Re Martino succedette Ferdinando I di\u003cbr\u003eCastiglia ma la regina Bianca rimase vicari"],["chunk_0066","RE MARTINO","valorosissimo Giovanni Moncada. Avvennero qua e là dei sanguinosi\u003cbr\u003escontri e la regina Bianca più volte fu costretta a riparare nel\u003cbr\u003eCastello Ursino. Ma Catania non le fu più fedele anche per la vendetta\u003cbr\u003edel Vescovo di allora, che sollevò la popolazione contro la Regina,\u003cbr\u003etanto che questa una notte dovette fuggire vestita da monaca e\u003cbr\u003erifugiarsi nella Rocca d'Aci. Allora il Conte di Modica passò dalla\u003cbr\u003emaniera forte alla tattica della seduzione, svela"],["chunk_0067","RE MARTINO","Moncada erano asserragliati. Però mentre tutto pareva perduto, il\u003cbr\u003eMoncada con gran valore ed audacia liberò il Castello dagli\u003cbr\u003eassalitori. Il popolo Siracusano, ammirando tanto valore, si rivoltò e\u003cbr\u003escacciò dalla città gli armati del Caprera. La notizia della vittoria\u003cbr\u003esi diffuse per tutta la Sicilia; Palermo si schierò per la Regina e la\u003cbr\u003einvitò a risiedere in quella città. Ma con ciò le lotte della infelice\u003cbr\u003eRegina non ebbero fine; i tradimenti, gli"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"RE MARTINO","marker":{"color":"#FEAF16","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"RE MARTINO","orientation":"v","showlegend":true,"x":[-4.6762533,-4.732066,-4.7124844,-4.375763,-4.3498406,-4.482836,-4.170333,-3.8761652,-3.9854271,-3.8271997],"xaxis":"x","y":[-1.9365178,-1.6860014,-1.4569083,-1.3512076,-1.6629199,-1.6704767,-1.9120976,-2.050032,-2.1981125,-2.2633226],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0068","I RE DI CASTIGLIA","Dopo la morte di Re Martino ed il ritiro della bella regina Bianca, la\u003cbr\u003estoria del Castello entra in un periodo d'ombra, in cui gli interessi\u003cbr\u003ee le egemonie si cambiano spesso in sconcertanti episodi, per cui i\u003cbr\u003eborghigiani vengono ceduti e comprati, passando da un padrone\u003cbr\u003eall'altro come materia vile. Cercando di far chiaro in questo punto\u003cbr\u003eoscuro per la storia del Castello, si apprende come nel 1416 il Vice\u003cbr\u003eRe di Sicilia, nella persona dell'Infante"],["chunk_0069","I RE DI CASTIGLIA","Vice Re di allora, Velasquez, per 10.000 fiorini. A quella vendita si\u003cbr\u003eoppose il Vescovo di Catania, ma Velasquez ebbe lo stesso il Castello.\u003cbr\u003eNel 1434 il Vice Re moriva ed il Castello passò di diritto al fratello\u003cbr\u003edel Re: l'Infante Pietro Conte di Noto. Nel 1437 ripassava al Re e\u003cbr\u003equindi nuovamente al Demanio, con gran giubilo della popolazione. Però\u003cbr\u003eRe Alfonso, come aveva venduto la prima volta, vendette la seconda.\u003cbr\u003ePer i Re di Castiglia avevano va"],["chunk_0070","I RE DI CASTIGLIA","Re Alfonso. Fu una grande ingiustizia ed il povero Sancio, figlio di\u003cbr\u003eG. B. Platamone, ne fu avvilito e disperato. Si deve a questa\u003cbr\u003edisperazione se ebbe il coraggio di non tenere conto della sentenza\u003cbr\u003eemanata dal tribunale ed invece di consegnare il Castello vi si\u003cbr\u003erinchiuse dentro, munendosi alla meno peggio e cercando di imitare le\u003cbr\u003egesta d'Artale d'Alagona. Ma Sancio non era Artale. Il Castello fu\u003cbr\u003eassediato, fu presto preso d'assalto ed il poveret"],["chunk_0071","I RE DI CASTIGLIA","tempo sperava, perché dai padri sentiva decantare il tempo felice in\u003cbr\u003ecui aveva regnato Re Martino. E poiché era stanca delle vessazioni a\u003cbr\u003ecui i diversi feudatari la sottoponevano, vessazioni che si facevano\u003cbr\u003esempre più dure e più gravi ad ogni cambiare di padrone, decise di\u003cbr\u003emandare una deputazione all'Imperatore per implorare che il turbinoso\u003cbr\u003ee vessatorio periodo avesse fine. A tal uopo un consiglio, composto\u003cbr\u003edei maggiorenti dei diversi nuclei abi"],["chunk_0072","I RE DI CASTIGLIA","fiorini ed i molti regali in natura, fra i quali un bellissimo cavallo\u003cbr\u003e« bajo pizziato », promise e confermò il contratto di perpetua\u003cbr\u003eliberazione dal vassallaggio, contratto che era stato stipulato con la\u003cbr\u003eRegia Corte di Messina. Col decreto da Ipruk il 5-7-1530 riconfermò\u003cbr\u003ealtresì il privilegio della fiera franca, che a quei tempi si teneva\u003cbr\u003ead Aquilia (7). Così il territorio di Aci divenne del Regio Demanio ed\u003cbr\u003eil Castello fu consegnato alla città"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"I RE DI CASTIGLIA","marker":{"color":"#F8A19F","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"I RE DI CASTIGLIA","orientation":"v","showlegend":true,"x":[-2.6699286,-2.8481815,-2.416043,-2.4925988,-2.3858616],"xaxis":"x","y":[-0.96354747,-0.95992863,-0.75397515,-1.1663603,-1.1022757],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0073","LA CHIESA IN TERRITORIO D'ACI","Fino a quel tempo in ogni borgata o frazione di Aci esisteva una\u003cbr\u003epropria chiesa e ad Aci la chiesa sorgeva nel piano del Castello. Si\u003cbr\u003ecrede di individuarne il posto di ubicazione in via G. Marconi dal N.\u003cbr\u003e1 al N. 29 di detta via. A confortare questa ipotesi stanno il gran\u003cbr\u003enumero di scheletri umani trovati ultimamente, quando s'è pavimentata\u003cbr\u003ea nuovo detta via Marconi. Questa chiesa era dedicata a S. Marina,\u003cbr\u003eevidente deformazione di S. Maurina, ed e"],["chunk_0074","LA CHIESA IN TERRITORIO D'ACI","ritornando alla chiesa d'Aci Castello, si deve dedurre che questa sia\u003cbr\u003estata di un'antichità superiore a quelle menzionate nel corso di\u003cbr\u003equesta breve storia. Infatti se leggenda non è la consegna delle Sacre\u003cbr\u003eReliquie di S. Agata, riferendoci a quanto hanno scritto alcuni\u003cbr\u003eautorevoli scrittori fra i quali Pirro Gaetani (2), in cui si apprende\u003cbr\u003ecome le reliquie di S. Agata fossero portate nella chiesa di Jachium\u003cbr\u003eed il 17 agosto del 1126 queste Sante Re"],["chunk_0075","LA CHIESA IN TERRITORIO D'ACI","in pergamena. Ciò fa supporre che quel messale risalisse al tempo in\u003cbr\u003ecui la stampa non era ancora inventata. Fra le artiglierie si rinvenne\u003cbr\u003eun cannone di bronzo lungo 12 palmi e 1\u002f2 segnato con stemma\u003cbr\u003egentilizio e la data del 1528. Peccato che non si sappia nulla del\u003cbr\u003eluogo in cui questi preziosi cimeli siano andati a finire (3). Intanto\u003cbr\u003ei dissidi fra gli abitanti della terra d'Aci diventavano sempre più\u003cbr\u003eprofondi. Sembra incredibile che gente dell"],["chunk_0076","LA CHIESA IN TERRITORIO D'ACI","Carcina). Ma poi, sempre a cagione della rivalità, si separarono nel\u003cbr\u003e1647. Sebbene grandi avvenimenti storici non fossero avvenuti ed il\u003cbr\u003eCastello avesse perso la primitiva importanza come opera di difesa,\u003cbr\u003eessendo ormai in uso e generalizzate le armi da fuoco, Re Filippo IV\u003cbr\u003efu indotto nel 1634 a restaurarlo e forse fu l'ultimo grande restauro\u003cbr\u003eche vi si fece. In quella occasione il Re appose una lapide di marmo\u003cbr\u003eall'entrata, dopo il ponte levatoio,"],["chunk_0077","LA CHIESA IN TERRITORIO D'ACI","corteo passarono sotto porta Messina e venuti nel recinto del Castello\u003cbr\u003epassarono sotto porta Saturnia, che era la porta che dal primo recinto\u003cbr\u003efortificato immetteva nel secondo recinto. In chiesa furono celebrate\u003cbr\u003edelle funzioni propiziatrici ed il Te Deum, mentre un banditore in\u003cbr\u003ecostume antico, ad alta voce, preceduto dal suono delle campane,\u003cbr\u003eannunziava l'atto di vendita e l'avvenuto possesso. A Don Andrea Massa\u003cbr\u003esuccesse il figlio Don Cristoforo e"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA CHIESA IN TERRITORIO D'ACI","marker":{"color":"#90AD1C","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA CHIESA IN TERRITORIO D'ACI","orientation":"v","showlegend":true,"x":[-2.9143538,-2.9586256,-3.3239026,-2.6574793,-2.3646438],"xaxis":"x","y":[2.9973693,3.0844846,3.0338957,0.55453944,2.4389648],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0078","LA CHIESA DI S. MAURO","Dopo la visita pastorale del Vescovo di Catania Monsignore Faraone\u003cbr\u003eavvenuta, come si rileva da documenti, nel 1571 e con la quale si mise\u003cbr\u003ein rilievo l'insufficienza anche funzionale della chiesa (mancava\u003cbr\u003efinanche il fonte Battesimale), si pensò alla costruzione di una\u003cbr\u003enuova, più ampia chiesa. Si ha ragione di credere che la costruzione\u003cbr\u003edella nuova avesse inizio nei primi anni del secolo XVII, perché dai\u003cbr\u003edocumenti risulta che la chiesa fu benedett"],["chunk_0079","LA CHIESA DI S. MAURO","dando luogo qualche volta, in occasione della festa, a piccoli episodi\u003cbr\u003eche hanno sapore di fanatismo. La Chiesa, nei primi tempi della sua\u003cbr\u003ecostruzione, non dovette essere molto addobbata, tanto che noi\u003cbr\u003etroviamo un quadro che doveva essere il principale adornamento,\u003cbr\u003eraffigurante S. Mauro benedicente, con la data del 1681 ed il fonte\u003cbr\u003ebattesimale, attualmente situato nella chiesa di S. Giuseppe, portante\u003cbr\u003ela data del 1684. Il terremoto del 1693 provo"],["chunk_0080","LA CHIESA DI S. MAURO","cui ancora sparsi qua e là sono visibili i bellissimi particolari, e\u003cbr\u003efu murata sotto la finestra, che era rimasta dalla prima fabbrica, la\u003cbr\u003eseguente epigrafe: D. O. M. AELEMOSINA CIVIUM OB DIVI MAURI\u003cbr\u003eVENERATIONEM HAEC AEDES ERECTA FUIT MAGNA ASSISTENTIA VICARI LOCI D.\u003cbr\u003ePAULI ROMEO ANNO D M I 1718 Non passarono molti anni che la chiesa di\u003cbr\u003eS. Mauro, pur così mirabilmente riparata, doveva apparire\u003cbr\u003einsufficiente, specialmente agli occhi di un altro gra"],["chunk_0081","LA CHIESA DI S. MAURO","denaro non ne trovò. Al Vaticano furono larghi di consigli, di premure\u003cbr\u003ema... in quanto a denaro era un'altra cosa. Allora vediamo il nostro\u003cbr\u003epresule girare Roma in lungo ed in largo. Entrò in tutte le chiese,\u003cbr\u003evisitò tutte le basiliche e fra le altre, quella che maggiormente\u003cbr\u003eattirò la sua attenzione fu la chiesa di S. Maria degli Angeli. Pensò\u003cbr\u003eche in quelle forme doveva essere ampliata la chiesa di S. Mauro.\u003cbr\u003eRitornò ad Aci-Castello con lo schizzo a"],["chunk_0082","LA CHIESA DI S. MAURO","dai più facoltosi a chiedere denaro. Da uno di questi un giorno ebbe\u003cbr\u003eun pezzo d'argento, del valore di 12 tarì, e questa moneta fu e rimase\u003cbr\u003ebase e castelletto di tutto il finanziamento della fabbrica; da quando\u003cbr\u003equella moneta entrò nella cassetta delle elemosine, si racconta che il\u003cbr\u003eVicario Nicolosi non fu più visto in giro a raccogliere fondi. I\u003cbr\u003edenari venivano da soli senza particolare sollecitazione ed il buon\u003cbr\u003eVicario non fu mai costretto a scam"],["chunk_0083","LA CHIESA DI S. MAURO","1834, quando morì, fu seppellito nella chiesa di S. Giuseppe come un\u003cbr\u003eoscuro cittadino. Il collocamento di detta lapide non fu cosa facile e\u003cbr\u003epiana come potrebbe apparire a prima vista, ma diede luogo a polemiche\u003cbr\u003eed a prese di posizioni, sia da parte del clero sia delle popolazioni\u003cbr\u003epiù o meno interessate, che si credettero menomate da tanta\u003cbr\u003eiscrizione. Primo a ribellarsi fu il clero di Aci S. Filippo che in\u003cbr\u003equella scrittura intese sminuito il: « TO"],["chunk_0084","LA CHIESA DI S. MAURO","fu pari allo spirito di parte, si proposero di asportare la lapide già\u003cbr\u003ecollocata sperando nella sorpresa od addirittura nella forza. La\u003cbr\u003erisposta a tanta violenta minaccia questa volta la diede il popolo di\u003cbr\u003eAci-Castello col formare delle squadre di volenterosi cittadini che\u003cbr\u003es'alternavano, specialmente la notte, a far la guardia alla tanto\u003cbr\u003etemuta e nello stesso tempo ambita, iscrizione. E questo fin quando\u003cbr\u003egli animi non furono placati ed il buon se"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA CHIESA DI S. MAURO","marker":{"color":"#F6222E","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA CHIESA DI S. MAURO","orientation":"v","showlegend":true,"x":[-1.8867376,-1.8886293,-1.6900927,-1.6466343,-1.4693216,-1.5569426,-1.8044118],"xaxis":"x","y":[2.8201995,3.1857631,2.899634,2.647521,2.9381719,3.0147977,3.2711844],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0085","LA CHIESA DI S. GIUSEPPE","Senza dubbio i secoli XVII e XVIII sono stati quelli in cui la fede\u003cbr\u003eebbe il suo massimo splendore e di questo abbiamo certezza\u003cbr\u003econsiderando il gran numero di chiese che in quel periodo si\u003cbr\u003ecostruivano dovunque. In Sicilia, Catania sta alla testa di tutte le\u003cbr\u003ecittà con ben 116 chiese, seguita nella nostra provincia da Aci-Reale\u003cbr\u003eed in misura minore dagli altri paesi vicini. Aci-Castello non ha\u003cbr\u003evoluto essere da meno e sebbene ormai avesse la sua grand"],["chunk_0086","LA CHIESA DI S. GIUSEPPE","della chiesa parrocchiale avvenuta, come s'è detto, il 19 luglio del\u003cbr\u003e1943. Chiesa di modeste dimensioni e fattura, con affreschi sulla\u003cbr\u003evolta di qualche interesse artistico, ormai quasi cancellati dalla\u003cbr\u003emano del tempo e dagli uomini. Il campanile aveva una bella guglia\u003cbr\u003epiramidale che si è dovuta demolire perché pericolante per le lesioni\u003cbr\u003eriportate a seguito del terremoto del 1908. Data la forma della sua\u003cbr\u003ecostruzione e le caratteristiche della chie"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA CHIESA DI S. GIUSEPPE","marker":{"color":"#1CFFCE","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA CHIESA DI S. GIUSEPPE","orientation":"v","showlegend":true,"x":[-2.2718756,-2.158993],"xaxis":"x","y":[3.4381332,3.5625281],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0087","LA SULTANA","Nel 1650, durante il governatorato di Don Diego, avvenne che, durante\u003cbr\u003euna tempesta di mare, una flotta Ottomana che navigava al largo della\u003cbr\u003ecosta fu quasi distrutta dal mare infuriato. Delle navi parte andò al\u003cbr\u003efondo, parte fu spinta dai marosi sugli scogli. In una di queste navi\u003cbr\u003ev'era a bordo un Rais ed i familiari del Bey di Tunisi e con loro una\u003cbr\u003egiovane figlia dello stesso Bey che si chiamava Halidè. Dai pescatori\u003cbr\u003edella costa i naufraghi furono"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"LA SULTANA","marker":{"color":"#2ED9FF","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"LA SULTANA","orientation":"v","showlegend":true,"x":[-3.6197186],"xaxis":"x","y":[-1.9422842],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0088","SCIAGURA IN TERRA D'ACI","L'11 gennaio 1693 fu giornata di grande sciagura per buona parte della\u003cbr\u003eSicilia orientale (1), ma in special modo per la terra d'Aci. Un\u003cbr\u003etremendo terremoto sconvolse e fece tremare la terra, distruggendo la\u003cbr\u003emaggior parte dei fabbricati e mietendo numerose vittime. Anche il\u003cbr\u003eCastello ebbe molti danni; le case del borgo furono quasi tutte\u003cbr\u003eabbattute, compresa la chiesa di S. Marina che fu completamente\u003cbr\u003edistrutta e non più edificata. Così scomparve dal"],["chunk_0089","SCIAGURA IN TERRA D'ACI","pensò a riparare a proprie spese la chiesa di S. Mauro coadiuvato,\u003cbr\u003ecome già detto, dal Vicario Don Paolo Romeo. Aiutò, indi, i cittadini\u003cbr\u003ea ricostruire le proprie case. Passa quasi un secolo dalla tremenda\u003cbr\u003esciagura del 1693 ed il Castello, di vendita in vendita, perviene a\u003cbr\u003eDon Salvatore Massa Valguarnera, che il 24 maggio 1788 viene investito\u003cbr\u003edell'ambito possesso. Questi donò il Castello alla figliola che andò\u003cbr\u003esposa ad Antonio Asmundo, Principe di"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"SCIAGURA IN TERRA D'ACI","marker":{"color":"#B10DA1","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"SCIAGURA IN TERRA D'ACI","orientation":"v","showlegend":true,"x":[-2.4230845,-2.7745097],"xaxis":"x","y":[2.9272645,1.3721542],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0090","IL CANTO DEL CARCERATO","Ci sembra, a questo punto, opportuno, per il fine storico del nostro\u003cbr\u003emodesto lavoro, inserire un triste episodio capitato oltre la metà del\u003cbr\u003e1700 quando il Castello era nominalmente in possesso di uno dei duca\u003cbr\u003eMassa, ma in effetti era divenuto una crudele prigione per gli uomini\u003cbr\u003epolitici che sin da quel remoto tempo aspiravano e sognavano l'unità\u003cbr\u003ed'Italia. Il Duca Massa era nominalmente il padrone, ma chi faceva e\u003cbr\u003esfaceva era il governatore del Ca"],["chunk_0091","IL CANTO DEL CARCERATO","prendere la cosa. Fuggì, sperando in tal modo di sottrarsi al destino\u003cbr\u003eche certamente l'attendeva. Non s'ingannava; vi fu chi vide e riferì;\u003cbr\u003eed il povero disgraziato cacciatore fu poco dopo arrestato. Poscia,\u003cbr\u003elegato ad una coda di cavallo, fu trascinato per tre volte in giro per\u003cbr\u003eil paese ed infine portato al Castello e chiuso in una tetra prigione.\u003cbr\u003eCosa aveva fatto costui? Per un nulla era diventato un nemico del\u003cbr\u003egovernatore e forse del Duca Massa"],["chunk_0092","IL CANTO DEL CARCERATO","voleri del governatore ed allora pensò di mettere in versi un lamento\u003cbr\u003ee cantarlo. Così avrebbe attirato l'attenzione del Duca. Ecco i versi:\u003cbr\u003eTi fazzu rivirenza Duca Massa, Comu fussi lu Re in pirsuna stissa La\u003cbr\u003eto' parola in Sigilia passa E quannu parri tu, l'unfernu abissa. Iu\u003cbr\u003esugnu cunnannatu na sta fossa Sunu tridici anni ca no' viu missa. Ti\u003cbr\u003epreju libirarimi o Duca Massa, Pi quandu amuri porti alla Duchissa.\u003cbr\u003eVenne il giorno che il Duca soggior"],["chunk_0093","IL CANTO DEL CARCERATO","versi da Don Sebastiano Marletta, uomo di lettere e di politica, nato\u003cbr\u003ee vissuto in Aci-Castello e morto il 31 ottobre del 1918. Ancor un\u003cbr\u003eepisodio che conferma la durezza delle prigioni del Castello ce lo\u003cbr\u003eoffre il rischio di morte affrontato da due carcerati che, pur di\u003cbr\u003esottrarsi all'impossibile vita che si menava in quelle dure prigioni,\u003cbr\u003eosarono l'inosabile. Erano due giovani ed ardimentosi liberali, figli\u003cbr\u003edella più spiccata nobiltà; uno, Giovann"],["chunk_0094","IL CANTO DEL CARCERATO","Le privazioni, gli stenti a cui erano sottoposti si facevano sempre\u003cbr\u003epiù duri, tanto da sfiorare il limite della resistenza fisica e\u003cbr\u003emorale. In altre parole i nostri giovani non ne potevano più. Quella\u003cbr\u003ecattività, quella morte civile, in un modo od in un altro doveva\u003cbr\u003efinire; e poiché le richieste d'appello non erano prese nemmeno in\u003cbr\u003econsiderazione, pensarono d'evadere. Come? Idearono i più impensati\u003cbr\u003emodi, escogitarono i più audaci propositi che poi"],["chunk_0095","IL CANTO DEL CARCERATO","pomeriggio di marzo, una di quelle giornate in cui il vento sembrava\u003cbr\u003escuotere il Castello dalle fondamenta; ed i prigionieri come al solito\u003cbr\u003efurono fatti uscire dalle celle per la rituale « aria ». Vediamo\u003cbr\u003eGiovanni ed Antonio, vicini più che mai, passeggiare nel recinto a ciò\u003cbr\u003edestinato. Ad un tratto si guardano negli occhi e si sussurrano\u003cbr\u003equalche cosa. Poi uno dopo l'altro accusano freddo e chiedono il\u003cbr\u003epermesso di andare a prendere la coperta. Ott"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u003cbr\u003e\u003cbr\u003e\u003cb\u003ePreview:\u003c\u002fb\u003e\u003cbr\u003e%{customdata[2]}\u003cextra\u003e\u003c\u002fextra\u003e","legendgroup":"IL CANTO DEL CARCERATO","marker":{"color":"#C075A6","symbol":"circle","line":{"color":"black","width":0.7},"opacity":0.9,"size":9},"mode":"markers","name":"IL CANTO DEL CARCERATO","orientation":"v","showlegend":true,"x":[-4.5557346,-4.5403824,-4.6713963,-4.998342,-4.73247,-4.7492876],"xaxis":"x","y":[0.807087,0.7172104,0.5491635,0.5830565,0.7810989,0.63139635],"yaxis":"y","type":"scatter"},{"customdata":[["chunk_0096","ACI-TREZZA","Mentre i Duca Massa si succedevano nel possesso del Castello, nei\u003cbr\u003eterritori viciniori era feudatario Luigi della Casa Reggio, Principe\u003cbr\u003edi Campofiorito. Questo Principe nel 1670 era stato mandato nei nostri\u003cbr\u003eterritori dal Vice Re di Sicilia Don Ferdinando De Cueva per\u003cbr\u003eorganizzare i soccorsi e rincuorare la popolazione di Catania\u003cbr\u003eminacciata da una delle tante eruzioni dell'Etna. Egli fu pari alla\u003cbr\u003efama che lo aveva preceduto ed ancora se ne ricorda t"],["chunk_0097","ACI-TREZZA","due secoli fa aveva destato tanta ammirazione. Trezza (1), come s'è\u003cbr\u003edetto, sotto l'impulso di questo magnanimo Principe crebbe di\u003cbr\u003epopolazione e d'importanza. Come s'apprende dal libro del Sac. Bella,\u003cbr\u003eallo scalo di Trezza verso il 1750 approdavano e partivano in media 30\u003cbr\u003efeluche al mese per le diverse direzioni, specialmente per Catania,\u003cbr\u003eAugusta, Siracusa, Malta, Taormina ed anche Napoli. Il traffico\u003cbr\u003ecomplessivo s'aggirava dai 3000-4000 onze l'ann"],["chunk_0098","ACI-TREZZA","mantenuto in un incomprensibile abbandono. Nella costruzione di detti\u003cbr\u003ebastioni, come è facilmente visibile, fu largamente impiegato il\u003cbr\u003equadrone romano (3) ed i detti fortini non avevano il compito di\u003cbr\u003evedetta, come potrebbe sembrare a prima vista, perché a scrutare\u003cbr\u003el'orizzonte marino in questo settore saranno bastate certamente le\u003cbr\u003evedette poste su Capo Mulini e sulla torre del Castello d'Aci. Dunque\u003cbr\u003eerano due piccole fortezze, forse d'origine roma"],["chunk_0099","ACI-TREZZA","cittadina ed è questa la più spiccata caratteristica del luogo. Questa\u003cbr\u003evita, semplice e patriarcale, ha ispirato il nostro grande Giovanni\u003cbr\u003eVerga a scrivere quel capolavoro che è « I Malavoglia », trasfondendo\u003cbr\u003enei suoi personaggi l'anima dei pescatori di Aci-Trezza e della « casa\u003cbr\u003edel nespolo », ne ha fatto il prototipo delle case dei pescatori del\u003cbr\u003esecolo passato. Il turista che arriva o soggiorna ad Aci-Trezza non\u003cbr\u003edeve trascurare di fare in barca"],["chunk_0100","ACI-TREZZA","sovrasta Aci-Trezza, godrà di un ampio e vasto panorama che abbraccia\u003cbr\u003egran parte della costa siculo-orientale ed oltre, poiché con tempo\u003cbr\u003echiaro nitidamente si vede la Calabria e l'altopiano della Sila. Se si\u003cbr\u003eporterà sul « Castellaccio », che è il monte che sovrasta il cimitero\u003cbr\u003edi Aci-Castello, godrà di un panorama meno vasto, ma più\u003cbr\u003eparticolareggiato e più interessante. Su quel cocuzzolo, inaccessibile\u003cbr\u003eda tre lati, ricorderà che ivi nel 1396 Re M"]],"hovertemplate":"\u003cb\u003eChunk:\u003c\u002fb\u003e %{customdata[0]}\u003cbr\u003e\u003cb\u003eSezione:\u003c\u002fb\u003e %{customdata[1]}\u00
